<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>记·账</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--radius:16px;--radius-sm:10px;--font:'Noto Sans SC',sans-serif;--mono:'DM Mono',monospace;--safe-b:env(safe-area-inset-bottom,0px)}
:root,.theme-auto{--bg:#0a0a0a;--bg-card:#141414;--bg-elevated:#1a1a1a;--bg-input:#1e1e1e;--text-p:#f0ece4;--text-s:#8a8578;--text-m:#5a564e;--border:rgba(255,255,255,.06);--accent:#c8a96e;--accent-d:rgba(200,169,110,.12);--income:#6ec89a;--income-d:rgba(110,200,154,.12);--expense:#c8706e;--expense-d:rgba(200,112,110,.12);--nav-bg:rgba(10,10,10,.88);--header-bg:rgba(10,10,10,.85)}
.theme-auto{color-scheme:dark}
@media(prefers-color-scheme:light){:root,.theme-auto{--bg:#f5f2ed;--bg-card:#fff;--bg-elevated:#f0ece4;--bg-input:#f0ece4;--text-p:#1a1714;--text-s:#7a756c;--text-m:#a8a39a;--border:rgba(0,0,0,.08);--nav-bg:rgba(245,242,237,.88);--header-bg:rgba(245,242,237,.85);color-scheme:light}}
.theme-light{--bg:#f5f2ed;--bg-card:#fff;--bg-elevated:#f0ece4;--bg-input:#f0ece4;--text-p:#1a1714;--text-s:#7a756c;--text-m:#a8a39a;--border:rgba(0,0,0,.08);--nav-bg:rgba(245,242,237,.88);--header-bg:rgba(245,242,237,.85);color-scheme:light}
.theme-dark{--bg:#0a0a0a;--bg-card:#141414;--bg-elevated:#1a1a1a;--bg-input:#1e1e1e;--text-p:#f0ece4;--text-s:#8a8578;--text-m:#5a564e;--border:rgba(255,255,255,.06);--nav-bg:rgba(10,10,10,.88);--header-bg:rgba(10,10,10,.85);color-scheme:dark}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text-p);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.app{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;position:relative}
.page{flex:1;display:none;flex-direction:column;padding-bottom:calc(72px + var(--safe-b));animation:pageIn .3s ease-out}
.page.active{display:flex}
.subpage{display:none;flex-direction:column;flex:1}
.subpage.active{display:flex}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--nav-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border-top:1px solid var(--border);display:flex;padding:8px 16px calc(8px + var(--safe-b));z-index:100;transition:background .3s,border-color .3s}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;background:none;border:none;color:var(--text-m);transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-item svg{width:22px;height:22px;transition:transform .2s}
.nav-item.active svg{transform:scale(1.1)}
.nav-item span{font-size:10px;font-weight:500;letter-spacing:.5px}
.header{padding:52px 20px 14px;position:sticky;top:0;background:var(--header-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:50;transition:background .3s}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:22px;font-weight:600;letter-spacing:-.5px}
.header h1 em{font-style:normal;color:var(--accent)}
.header-sub{font-size:12px;color:var(--text-s);margin-top:2px}
.back-btn{background:none;border:none;color:var(--accent);font-size:14px;font-family:var(--font);cursor:pointer;padding:4px 0}
.overview{margin:0 16px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px 20px;position:relative;overflow:hidden;transition:background .3s,border-color .3s}
.overview::before{content:'';position:absolute;top:-60px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(200,169,110,.25)0%,transparent 70%);opacity:.4;pointer-events:none}
.ov-label{font-size:12px;color:var(--text-s);font-weight:500;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.ov-amount{font-family:var(--mono);font-size:36px;font-weight:500;letter-spacing:-1px;line-height:1.1}
.ov-amount .cur{font-size:20px;color:var(--text-s);margin-right:2px}
.ov-row{display:flex;gap:1px;margin-top:18px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden}
.ov-col{flex:1;padding:14px 12px;background:var(--bg-card);display:flex;flex-direction:column;gap:4px;transition:background .3s}
.ov-col .lbl{font-size:11px;color:var(--text-s);font-weight:500}
.ov-col .val{font-family:var(--mono);font-size:16px;font-weight:500}
.ov-col.inc .val{color:var(--income)}.ov-col.exp .val{color:var(--expense)}
.quick-add{margin:0 16px 16px;display:flex;gap:10px}
.qbtn{flex:1;padding:14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-card);color:var(--text-p);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.qbtn:active{transform:scale(.97);background:var(--bg-elevated)}
.dot{width:8px;height:8px;border-radius:50%}
.dot.e{background:var(--expense)}.dot.i{background:var(--income)}
.sec-title{padding:0 20px;font-size:13px;font-weight:600;color:var(--text-s);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.sec-title .more{font-size:11px;font-weight:400;color:var(--text-m);cursor:pointer}
.rec-group{margin-bottom:16px}
.rec-date{padding:0 20px;font-size:12px;color:var(--text-m);margin-bottom:6px;font-weight:500;display:flex;justify-content:space-between}
.rec-date .dt{font-family:var(--mono);color:var(--text-s)}
.rec{display:flex;align-items:center;padding:13px 20px;cursor:pointer;transition:background .1s}
.rec:active{background:var(--bg-elevated)}
.rec-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;margin-right:12px;flex-shrink:0;background:var(--bg-elevated)}
.rec-info{flex:1;min-width:0}
.rec-cat{font-size:14px;font-weight:500}
.rec-note{font-size:12px;color:var(--text-m);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec-amt{font-family:var(--mono);font-size:15px;font-weight:500;margin-left:12px;flex-shrink:0}
.rec-amt.exp{color:var(--expense)}.rec-amt.inc{color:var(--income)}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:0 16px 14px;transition:background .3s,border-color .3s}
.card-t{font-size:12px;color:var(--text-m);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.sub{font-size:12px;color:var(--text-s);margin-top:4px}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-left:6px}
.tag-up{background:var(--income-d);color:var(--income)}
.tag-down{background:var(--expense-d);color:var(--expense)}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:120px;padding-top:10px}
.cb-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.cb{width:100%;max-width:28px;border-radius:4px 4px 0 0;min-height:2px;transition:height .5s cubic-bezier(.22,1,.36,1)}
.cb.ebar{background:var(--expense);opacity:.8}.cb.ibar{background:var(--income);opacity:.8}
.cb-val{font-family:var(--mono);font-size:9px;margin-bottom:2px;white-space:nowrap;font-weight:500}
.cb-l{font-size:10px;color:var(--text-m);margin-top:6px;white-space:nowrap}
.legend{display:flex;gap:16px;margin-top:12px;justify-content:center}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text-s)}
.leg-d{width:8px;height:8px;border-radius:2px}
.pie-wrap{display:flex;align-items:center;gap:16px;margin:10px 0}
.pie-svg{width:120px;height:120px;flex-shrink:0}
.pie-svg circle{transition:stroke-dasharray .5s cubic-bezier(.22,1,.36,1),stroke-dashoffset .5s cubic-bezier(.22,1,.36,1)}
.pie-legend{flex:1;font-size:12px;max-height:160px;overflow-y:auto}
.pie-legend-item{display:flex;align-items:center;gap:6px;padding:4px 0;cursor:pointer;border-radius:6px;padding:6px 4px;transition:background .15s}
.pie-legend-item:active{background:var(--bg-elevated)}
.pie-legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.pie-legend-name{flex:1;color:var(--text-s);font-size:12px}
.pie-legend-val{font-family:var(--mono);font-weight:500;font-size:12px}
.cat-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:6px;padding:10px 4px}
.cat-row:last-child{border-bottom:none}
.cat-row:active{background:var(--bg-elevated)}
.cat-row .ce{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;margin-right:10px;flex-shrink:0;background:var(--bg-elevated)}
.cat-row .cn{flex:1;font-size:13px;font-weight:500}
.cat-bar-bg{flex:1;height:4px;background:var(--bg-elevated);border-radius:2px;margin:0 10px;overflow:hidden}
.cat-bar-fill{height:100%;border-radius:2px;transition:width .5s}
.cat-row .cp{font-size:11px;color:var(--text-m);margin-right:10px}
.cat-row .cv{font-family:var(--mono);font-size:13px;font-weight:500}
.tab-bar{display:flex;gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;margin:0 16px 14px}
.tab-btn{flex:1;padding:11px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;background:var(--bg-card);color:var(--text-s);border:none;font-family:var(--font);transition:all .2s}
.tab-btn.active{background:var(--bg-elevated);color:var(--text-p)}
.swipe-wrap{flex:1;overflow:hidden;position:relative}
.swipe-track{display:flex;transition:transform .35s cubic-bezier(.22,1,.36,1);will-change:transform;height:100%}
.swipe-panel{min-width:100%;flex-shrink:0;padding:0 0 20px;overflow-y:auto}
.swipe-dots{display:flex;justify-content:center;gap:6px;padding:10px 0 4px}
.swipe-dot{width:6px;height:6px;border-radius:50%;background:var(--text-m);transition:all .25s}
.swipe-dot.active{background:var(--accent);width:20px;border-radius:3px}
.swipe-lbl{text-align:center;font-size:13px;color:var(--text-s);font-weight:500;padding:2px 0 8px}
.asset-item{display:flex;align-items:center;padding:14px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:background .15s}
.asset-item:active{background:var(--bg-elevated)}
.asset-item .ai-icon{font-size:20px;margin-right:12px;cursor:pointer}
.asset-item .ai-name{flex:1;font-size:14px;font-weight:500}
.asset-item .ai-val{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--accent)}
.asset-item .ai-del{color:var(--text-m);cursor:pointer;padding:4px 8px;font-size:16px;border:none;background:none}
.add-asset{width:100%;padding:12px;border:1px dashed var(--border);border-radius:var(--radius-sm);background:none;color:var(--text-s);font-family:var(--font);font-size:13px;cursor:pointer;text-align:center;transition:border-color .2s}
.add-asset:active{border-color:var(--accent)}
.asset-total{text-align:center;padding:16px 0}
.asset-total .at-label{font-size:12px;color:var(--text-s);text-transform:uppercase;letter-spacing:1px}
.asset-total .at-val{font-family:var(--mono);font-size:32px;font-weight:500;margin-top:4px;color:var(--accent)}
.asset-trend{margin-top:4px;font-size:12px;color:var(--text-s)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal{width:100%;max-width:430px;background:var(--bg-card);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);max-height:90dvh;overflow-y:auto}
.modal-overlay.show .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--text-m);border-radius:2px;margin:0 auto 16px}
.modal h2{font-size:18px;font-weight:600;margin-bottom:16px}
.input-wrap{position:relative;margin-bottom:14px}
.input-wrap .sym{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:20px;color:var(--text-s)}
.amt-input{width:100%;padding:14px 14px 14px 32px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-p);font-family:var(--mono);font-size:20px;font-weight:500;outline:none;transition:border-color .2s}
.amt-input:focus{border-color:var(--accent)}
.txt-input{width:100%;padding:12px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-p);font-family:var(--font);font-size:14px;outline:none;margin-bottom:14px;transition:border-color .2s}
.txt-input:focus{border-color:var(--accent)}
.txt-input::placeholder{color:var(--text-m)}
.sel-input{width:100%;padding:12px 14px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-p);font-family:var(--font);font-size:14px;outline:none;margin-bottom:14px;-webkit-appearance:none;appearance:none}
.sub-btn{width:100%;padding:14px;background:var(--accent);color:#0a0a0a;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.sub-btn:active{transform:scale(.98);opacity:.9}
.del-btn{width:100%;padding:14px;background:var(--expense-d);color:var(--expense);border:1px solid rgba(200,112,110,.2);border-radius:var(--radius-sm);font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:10px}
.del-btn:active{transform:scale(.98)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.cat-sel{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:all .15s;background:none;font-family:var(--font)}
.cat-sel:active{transform:scale(.95)}
.cat-sel.sel{border-color:var(--accent);background:var(--accent-d)}
.cat-sel .ci{font-size:22px}
.cat-sel .cl{font-size:10px;color:var(--text-s);font-weight:500;text-align:center;line-height:1.3}
.subcat-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.subcat-chip{padding:6px 12px;border-radius:20px;border:1px solid var(--border);background:var(--bg-input);font-size:12px;cursor:pointer;transition:all .15s;color:var(--text-s);font-family:var(--font)}
.subcat-chip.sel{border-color:var(--accent);background:var(--accent-d);color:var(--text-p)}
.subcat-chip.add-chip{border-style:dashed;color:var(--accent)}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.setting-row:last-child{border-bottom:none}
.setting-row:active{background:var(--bg-elevated)}
.setting-label{font-size:14px}
.theme-opts{display:flex;gap:4px;background:var(--bg-elevated);border-radius:8px;padding:3px}
.theme-opt{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-s);font-family:var(--font);transition:all .15s}
.theme-opt.active{background:var(--bg-card);color:var(--text-p);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.pie-toggle{display:flex;gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:12px}
.pie-tog-btn{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;background:var(--bg-card);color:var(--text-s);border:none;font-family:var(--font);transition:all .2s}
.pie-tog-btn.active{background:var(--bg-elevated);color:var(--text-p)}
.ov-split{display:flex;gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-top:14px}
.ov-s{flex:1;padding:14px 12px;background:var(--bg-card);transition:background .3s}
.ov-s .os-lbl{font-size:11px;color:var(--text-s);font-weight:500;margin-bottom:4px}
.ov-s .os-val{font-family:var(--mono);font-size:18px;font-weight:500}
.ov-s.exp .os-val{color:var(--expense)}.ov-s.inc .os-val{color:var(--income)}
.empty{padding:40px 20px;text-align:center;color:var(--text-m)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.5}
.empty-text{font-size:14px}
/* ═══ DATE PICKER ═══ */
.dp-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:250;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.dp-overlay.show{display:flex}
.dp-modal{width:100%;max-width:430px;background:var(--bg-card);border-radius:20px 20px 0 0;padding:16px 20px calc(16px + var(--safe-b));transform:translateY(100%);transition:transform .35s cubic-bezier(.22,1,.36,1)}
.dp-overlay.show .dp-modal{transform:translateY(0)}
.dp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.dp-header h3{font-size:16px;font-weight:600}
.dp-ok{background:none;border:none;color:var(--accent);font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
.dp-body{display:flex;gap:0;height:180px;position:relative;overflow:hidden}
.dp-col{flex:1;overflow-y:auto;scroll-snap-type:y mandatory;-webkit-overflow-scrolling:touch;mask-image:linear-gradient(transparent,#000 30%,#000 70%,transparent);-webkit-mask-image:linear-gradient(transparent,#000 30%,#000 70%,transparent)}
.dp-col::-webkit-scrollbar{display:none}
.dp-item{height:44px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:16px;color:var(--text-s);scroll-snap-align:center;transition:all .15s;cursor:pointer;flex-shrink:0}
.dp-item.sel{color:var(--text-p);font-weight:600;font-size:18px}
.dp-divider{position:absolute;left:0;right:0;height:44px;top:50%;transform:translateY(-50%);border-top:1px solid var(--border);border-bottom:1px solid var(--border);pointer-events:none}
.dp-label{font-size:11px;color:var(--text-m);text-align:center;margin-bottom:4px}
/* asset trend bar */
.at-bar-wrap{position:relative}
.at-pct{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-family:var(--mono);font-size:9px;white-space:nowrap;font-weight:500}
::-webkit-scrollbar{width:0}
.fade-up{opacity:0;transform:translateY(12px);animation:fadeUp .4s ease-out forwards}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}
/* Icon Picker */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:14px}
.icon-opt{width:100%;aspect-ratio:1;border-radius:10px;border:2px solid transparent;background:var(--bg-elevated);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.icon-opt:active{transform:scale(.9)}
.icon-opt.sel{border-color:var(--accent);background:var(--accent-d)}
/* Category Management Detail */
.cat-mgmt-item{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:6px;padding:12px 4px}
.cat-mgmt-item:last-child{border-bottom:none}
.cat-mgmt-item:active{background:var(--bg-elevated)}
.cat-mgmt-item .cm-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-right:12px;flex-shrink:0;background:var(--bg-elevated)}
.cat-mgmt-item .cm-name{flex:1;font-size:14px;font-weight:500}
.cat-mgmt-item .cm-count{font-size:12px;color:var(--text-m);margin-right:8px}
.cat-mgmt-item .cm-arrow{color:var(--text-m);font-size:14px}
/* Nickname input in profile */

  <div style="display:flex;gap:10px">
    <button class="qbtn" style="flex:1" onclick="confirmResolve(false)">取消</button>
    <button class="del-btn" style="flex:1;margin-top:0" id="confirm-ok-btn" onclick="confirmResolve(true)">确定</button>
  </div>
</div>

<script>
// ═══════════════════════════════
//  CUSTOM CONFIRM (replaces native confirm)
// ═══════════════════════════════
let _confirmCb=null;
function showConfirm(msg,onOk,title){
  document.getElementById('confirm-title').textContent=title||'确认';
  document.getElementById('confirm-msg').textContent=msg;
  document.getElementById('modal-confirm').classList.add('show');
  _confirmCb=onOk||null;
}
function confirmResolve(ok){
  document.getElementById('modal-confirm').classList.remove('show');
  if(ok&&_confirmCb){const cb=_confirmCb;_confirmCb=null;cb()}
  _confirmCb=null;
}
window.showConfirm=showConfirm;
window.confirmResolve=confirmResolve;

// ═══════════════════════════════
//  DATA
// ═══════════════════════════════
const SK='jz_data';
const DEF_CATS={
  expense:[
    {id:'food',icon:'🍜',label:'餐饮',subs:[{id:'dining',icon:'🍽️',label:'堂食'},{id:'delivery',icon:'🛵',label:'外卖'},{id:'snack',icon:'☕',label:'零食饮品'}]},
    {id:'traffic',icon:'🚇',label:'交通',subs:[{id:'subway',icon:'🚇',label:'地铁'},{id:'taxi',icon:'🚕',label:'打车'},{id:'bus',icon:'🚌',label:'公交'},{id:'fuel',icon:'⛽',label:'加油'}]},
    {id:'shop',icon:'🛍️',label:'购物',subs:[{id:'clothes',icon:'👔',label:'服饰'},{id:'digital',icon:'📱',label:'数码'},{id:'daily',icon:'🧴',label:'日用品'}]},
    {id:'house',icon:'🏠',label:'居住',subs:[{id:'rent',icon:'🏠',label:'房租'},{id:'utility',icon:'💡',label:'水电煤'},{id:'property',icon:'🏢',label:'物业'}]},
    {id:'fun',icon:'🎮',label:'娱乐',subs:[{id:'game',icon:'🎮',label:'游戏'},{id:'travel',icon:'✈️',label:'旅行'},{id:'movie',icon:'🎬',label:'影视'},{id:'sport',icon:'⚽',label:'运动'}]},
    {id:'medical',icon:'💊',label:'医疗',subs:[{id:'hospital',icon:'🏥',label:'看病'},{id:'medicine',icon:'💊',label:'药品'},{id:'health',icon:'🧬',label:'保健'}]},
    {id:'edu',icon:'📚',label:'教育',subs:[{id:'book',icon:'📖',label:'书籍'},{id:'course',icon:'🎓',label:'课程'}]},
    {id:'personal',icon:'💇',label:'个人',subs:[{id:'hair',icon:'💇',label:'美容'},{id:'skincare',icon:'🧴',label:'护肤'},{id:'gym',icon:'🏋️',label:'健身'}]},
    {id:'social',icon:'👥',label:'社交',subs:[{id:'gift',icon:'🎁',label:'礼物'},{id:'party',icon:'🍻',label:'聚餐'}]},
    {id:'other',icon:'📌',label:'其他',subs:[]}
  ],
  income:[
    {id:'salary',icon:'💼',label:'工资',subs:[{id:'base',icon:'💰',label:'基本工资'},{id:'overtime',icon:'⏰',label:'加班费'}]},
    {id:'bonus',icon:'🎁',label:'奖金',subs:[{id:'year',icon:'🧧',label:'年终奖'},{id:'perf',icon:'🏅',label:'绩效'}]},
    {id:'invest',icon:'📈',label:'理财',subs:[{id:'fund',icon:'📊',label:'基金'},{id:'stock',icon:'💹',label:'股票'},{id:'interest',icon:'🏦',label:'利息'}]},
    {id:'sideline',icon:'💻',label:'副业',subs:[{id:'freelance',icon:'💻',label:'自由职业'}]},
    {id:'redpack',icon:'🧧',label:'红包',subs:[]},
    {id:'other',icon:'💰',label:'其他',subs:[]}
  ]
};

const CAT_COLORS={
  food:'#E8964A',traffic:'#5B8DEF',shop:'#E05D9A',house:'#6BCB77',
  fun:'#9B6FE8',medical:'#E8564A',edu:'#4AC5C5',personal:'#E8C84A',
  social:'#8B6FE0',other:'#8A8578',
  salary:'#6EC89A',bonus:'#E8964A',invest:'#5B8DEF',
  sideline:'#9B6FE8',redpack:'#E05D9A'
};

const P_NAMES={alipay:'支付宝',wechat:'微信支付',bank_cmb:'招商银行',bank_icbc:'工商银行',bank_abc:'农业银行',bank_boc:'中国银行',bank_ccb:'建设银行',cash:'现金',credit:'信用卡',invest:'理财/基金',custom:'自定义'};
const P_ICONS={alipay:'💙',wechat:'💚',bank_cmb:'🏦',bank_icbc:'🏦',bank_abc:'🏦',bank_boc:'🏦',bank_ccb:'🏦',cash:'💵',credit:'💳',invest:'📊',custom:'💰'};
const ASSET_ICONS=['💙','💚','🏦','💵','💳','📊','💰','🪙','📱','💎','🏠','🚗','📦','🎯','🔑','📈','🎁','⭐','🔔'];
const CAT_ICONS=['🍜','🚇','🛍️','🏠','🎮','💊','📚','💇','👥','📌','💼','🎁','📈','💻','🧧','💰','☕','🛵','🚕','🚌','⛽','👔','📱','🧴','💡','🏢','✈️','🎬','⚽','🏥','🧬','📖','🎓','🏋️','🍻','⏰','🏅','📊','💹','🏦','🍽️','🎁'];
const AVATAR_OPTIONS=['🧑','👩','👨','👧','👦','🧔','👩‍🦰','👨‍🦱','👩‍🦳','🧙','🤖','🐱','🐶','🦊','🐼','🦁','🐸','🐧','🦄','🌟','😎','🎭'];

let DB=loadDB();
function loadDB(){try{return JSON.parse(localStorage.getItem(SK))||defDB()}catch(e){return defDB()}}
function defDB(){return{records:[],assets:[],categories:JSON.parse(JSON.stringify(DEF_CATS)),theme:'auto',profile:{avatar:'🧑',nickname:'记账达人'}}}
function saveDB(){localStorage.setItem(SK,JSON.stringify(DB))}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){const d=new Date();return`${d.getFullYear()}-${S(d.getMonth()+1)}-${S(d.getDate())}`}
function curMonth(){const d=new Date();return`${d.getFullYear()}-${S(d.getMonth()+1)}`}
function S(n){return String(n).padStart(2,'0')}

// Migration: add profile if missing
if(!DB.profile)DB.profile={avatar:'🧑',nickname:'记账达人'};

// ═══════════════════════════════
//  THEME
// ═══════════════════════════════
function applyTheme(t){DB.theme=t||DB.theme||'auto';document.documentElement.className=DB.theme==='auto'?'theme-auto':'theme-'+DB.theme;document.querySelectorAll('.theme-opt').forEach(b=>b.classList.toggle('active',b.dataset.t===DB.theme));saveDB()}

// ═══════════════════════════════
//  CATEGORIES
// ═══════════════════════════════
function getCats(t){return DB.categories[t]||[]}
function findCat(t,id){return getCats(t).find(c=>c.id===id)}
function findSub(t,cid,sid){return findCat(t,cid)?.subs?.find(s=>s.id===sid)}
function catLabel(t,cid,sid){const c=findCat(t,cid);if(!c)return'未知';if(sid){const s=findSub(t,cid,sid);return s?c.label+'/'+s.label:c.label}return c.label}
function catIcon(t,cid){return findCat(t,cid)?.icon||'📌'}
function catColor(cid){return CAT_COLORS[cid]||generateColor(cid)}

// Generate consistent color for dynamic categories
function generateColor(id){
  const palette=['#E8964A','#5B8DEF','#E05D9A','#6BCB77','#9B6FE8','#E8564A','#4AC5C5','#E8C84A','#8B6FE0','#8A8578','#6EC89A','#E87B4A','#4A8BE8','#E84AC5','#C5E84A'];
  let h=0;for(let i=0;i<id.length;i++)h=((h<<5)-h)+id.charCodeAt(i);
  return palette[Math.abs(h)%palette.length];
}

// ═══════════════════════════════
//  SEED
// ═══════════════════════════════
function seed(){
  if(DB.records.length>0)return;
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  const ec=getCats('expense'),notes=['午饭','地铁','淘宝','房租','电影','感冒药','买书','咖啡','外卖','打车','超市','话费','理发','健身','奶茶','早餐','晚餐','零食','水果','日用品'];
  function rr(yr,mo,md){const d=Math.floor(Math.random()*md)+1;const c=ec[Math.floor(Math.random()*ec.length)];const s=c.subs?.length?c.subs[Math.floor(Math.random()*c.subs.length)]:null;return{id:genId(),type:'expense',cat:c.id,sub:s?.id||null,amount:+(Math.random()*200+5).toFixed(2),note:notes[Math.floor(Math.random()*notes.length)],date:`${yr}-${S(mo+1)}-${S(d)}`,ts:new Date(yr,mo,d).getTime()}}
  for(let i=0;i<20;i++)DB.records.push(rr(y,m,now.getDate()));
  DB.records.push({id:genId(),type:'income',cat:'salary',sub:'base',amount:15000,note:'工资',date:`${y}-${S(m+1)}-10`,ts:new Date(y,m,10).getTime()});
  const lm=m===0?11:m-1,ly=m===0?y-1:y,ld=new Date(ly,lm+1,0).getDate();
  for(let i=0;i<16;i++)DB.records.push(rr(ly,lm,ld));
  DB.records.push({id:genId(),type:'income',cat:'salary',sub:'base',amount:15000,note:'工资',date:`${ly}-${S(lm+1)}-10`,ts:new Date(ly,lm,10).getTime()});
  for(let mo=0;mo<m;mo++){for(let i=0;i<10;i++)DB.records.push(rr(y,mo,28));DB.records.push({id:genId(),type:'income',cat:'salary',sub:'base',amount:15000,note:'工资',date:`${y}-${S(mo+1)}-10`,ts:new Date(y,mo,10).getTime()})}
  for(let mo=0;mo<12;mo++){for(let i=0;i<8;i++)DB.records.push(rr(y-1,mo,28));DB.records.push({id:genId(),type:'income',cat:'salary',sub:'base',amount:14000,note:'工资',date:`${y-1}-${S(mo+1)}-10`,ts:new Date(y-1,mo,10).getTime()})}
  DB.records.sort((a,b)=>b.ts-a.ts);
  for(let mo=Math.max(0,m-5);mo<=m;mo++){
    DB.assets.push({id:genId(),month:`${y}-${S(mo+1)}`,accounts:[
      {platform:'alipay',name:'支付宝',icon:'💙',amount:+(20000+Math.random()*10000).toFixed(2)},
      {platform:'wechat',name:'微信支付',icon:'💚',amount:+(5000+Math.random()*5000).toFixed(2)},
      {platform:'bank_cmb',name:'招商银行',icon:'🏦',amount:+(50000+Math.random()*20000).toFixed(2)},
    ]});
  }
  saveDB();
}

let dpYear,dpMonth,dpDay;

function openDatePicker(){
  const cur=document.getElementById('inp-date').value||today();
  const [y,m,d]=cur.split('-').map(Number);
  dpYear=y;dpMonth=m;dpDay=d;
  renderDP();
  document.getElementById('dp-overlay').classList.add('show');
}
function closeDatePicker(e,force){
  if(e&&e.target!==document.getElementById('dp-overlay')&&!force)return;
  document.getElementById('dp-overlay').classList.remove('show');
}
function confirmDate(){
  const dateStr=`${dpYear}-${S(dpMonth)}-${S(dpDay)}`;
  document.getElementById('inp-date').value=dateStr;
  document.getElementById('date-display-text').textContent=`${dpYear}年${dpMonth}月${dpDay}日`;
  document.getElementById('dp-overlay').classList.remove('show');
}
function renderDP(){
  const now=new Date();
  const years=[];for(let y=now.getFullYear()-5;y<=now.getFullYear()+1;y++)years.push(y);
  const months=[];for(let m=1;m<=12;m++)months.push(m);
  const daysInMonth=new Date(dpYear,dpMonth,0).getDate();
  const days=[];for(let d=1;d<=daysInMonth;d++)days.push(d);
  if(dpDay>daysInMonth)dpDay=daysInMonth;
  ['dp-year','dp-month','dp-day'].forEach((id,i)=>{
    const col=document.getElementById(id);
    const items=i===0?years:i===1?months:days;
    const val=i===0?dpYear:i===1?dpMonth:dpDay;
    col.innerHTML='<div style="height:68px;flex-shrink:0"></div>'+
      items.map(v=>`<div class="dp-item${v===val?' sel':''}" data-v="${v}" onclick="dpSelect(${i},${v},this)">${S(v)}</div>`).join('')+
      '<div style="height:68px;flex-shrink:0"></div>';
    setTimeout(()=>{const sel=col.querySelector('.dp-item.sel');if(sel)col.scrollTop=sel.offsetTop-68},50);
  });
  ['dp-year','dp-month','dp-day'].forEach((id,i)=>{
    const col=document.getElementById(id);
    col.onscroll=()=>{
      clearTimeout(col._scrollTimer);
      col._scrollTimer=setTimeout(()=>{
        const items=col.querySelectorAll('.dp-item');
        const ct=col.scrollTop+88;
        let closest=null,closestDist=Infinity;
        items.forEach(it=>{const dist=Math.abs(it.offsetTop+22-ct);if(dist<closestDist){closestDist=dist;closest=it}});
        if(closest){const v=parseInt(closest.dataset.v);if(i===0)dpYear=v;else if(i===1)dpMonth=v;else dpDay=v;items.forEach(it=>it.classList.toggle('sel',parseInt(it.dataset.v)===v));if(i!==2)renderDP()}
      },100);
    };
  });
}
function dpSelect(col,v,el){
  if(col===0)dpYear=v;else if(col===1)dpMonth=v;else dpDay=v;
  const parent=el.parentElement;
  parent.querySelectorAll('.dp-item').forEach(it=>it.classList.toggle('sel',parseInt(it.dataset.v)===v));
  parent.scrollTo({top:el.offsetTop-68,behavior:'smooth'});
  if(col!==2){
    const daysInMonth=new Date(dpYear,dpMonth,0).getDate();
    if(dpDay>daysInMonth)dpDay=daysInMonth;
    const dayCol=document.getElementById('dp-day');
    const days=[];for(let d=1;d<=daysInMonth;d++)days.push(d);
    dayCol.innerHTML='<div style="height:68px;flex-shrink:0"></div>'+
      days.map(d=>`<div class="dp-item${d===dpDay?' sel':''}" data-v="${d}" onclick="dpSelect(2,${d},this)">${S(d)}</div>`).join('')+
      '<div style="height:68px;flex-shrink:0"></div>';
  }
}

// ── Infinite scroll state ──
let homeBatch=0;
const HOME_BATCH_SIZE=20;

function renderHome(){
  homeBatch=0;
  const now=new Date(),ym=curMonth();
  document.getElementById('h-date').textContent=`${now.getFullYear()}年${now.getMonth()+1}月 · 周${['日','一','二','三','四','五','六'][now.getDay()]}`;
  const mr=DB.records.filter(r=>r.date.startsWith(ym));
  const inc=mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  document.getElementById('balance').textContent=(inc-exp).toFixed(2);
  document.getElementById('m-inc').textContent=`+${inc.toFixed(0)}`;
  document.getElementById('m-exp').textContent=`-${exp.toFixed(0)}`;
  renderHomeBatch(true);
}

function renderHomeBatch(reset){
  const el=document.getElementById('rec-list');
  if(reset){el.innerHTML='';homeBatch=0}
  const start=homeBatch*HOME_BATCH_SIZE;
  const batch=DB.records.slice(start,start+HOME_BATCH_SIZE);
  if(!batch.length&&!homeBatch){el.innerHTML='<div class="empty"><div class="empty-icon">📒</div><div class="empty-text">还没有记录</div></div>';return}
  const groups={};
  batch.forEach(r=>{(groups[r.date]=groups[r.date]||[]).push(r)});
  let html='';
  Object.entries(groups).forEach(([date,recs])=>{
    const d=new Date(date),de=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
    const isT=date===today();
    html+=`<div class="rec-group"><div class="rec-date"><span>${isT?'今天':`${d.getMonth()+1}月${d.getDate()}日`}</span><span class="dt">-${de.toFixed(0)}</span></div>`;
    recs.forEach(r=>{
      const lbl=catLabel(r.type,r.cat,r.sub);
      const icon=catIcon(r.type,r.cat);
      html+=`<div class="rec" onclick="editRecord('${r.id}')"><div class="rec-icon">${icon}</div><div class="rec-info"><div class="rec-cat">${lbl}</div>${r.note?`<div class="rec-note">${r.note}</div>`:''}</div><div class="rec-amt ${r.type}">${r.type==='income'?'+':'-'}${r.amount.toFixed(2)}</div></div>`;
    });
    html+='</div>';
  });
  if(batch.length>=HOME_BATCH_SIZE){
    html+=`<div id="load-more-sentinel" style="text-align:center;padding:16px;color:var(--text-m);font-size:13px">加载更多…</div>`;
  }else if(homeBatch>0){
    html+=`<div style="text-align:center;padding:16px;color:var(--text-m);font-size:13px">已显示全部 ${DB.records.length} 条记录</div>`;
  }
  el.insertAdjacentHTML('beforeend',html);
  homeBatch++;
  // Observe sentinel for next batch
  const sentinel=document.getElementById('load-more-sentinel');
  if(sentinel){
    const obs=new IntersectionObserver(entries=>{
      if(entries[0].isIntersecting){obs.disconnect();sentinel.remove();renderHomeBatch(false)}
    },{rootMargin:'100px'});
    obs.observe(sentinel);
  }
}

let editingId=null;

function editRecord(id){
  const r=DB.records.find(x=>x.id===id);if(!r)return;
  editingId=id;
  curType=r.type;curCat=r.cat;curSub=r.sub;
  document.getElementById('modal-add').classList.add('show');
  document.getElementById('m-title').textContent='编辑记录';
  document.getElementById('inp-amt').value=r.amount;
  document.getElementById('inp-note').value=r.note||'';
  document.getElementById('inp-date').value=r.date;
  const [y,m,d]=r.date.split('-');
  document.getElementById('date-display-text').textContent=`${y}年${parseInt(m)}月${parseInt(d)}日`;
  document.getElementById('save-btn').textContent='更新';
  document.getElementById('del-btn').style.display='block';
  updateTypeBtns();renderCatGrid();renderSubcats();
}

function openAddModal(type){
  editingId=null;
  curType=type||'expense';curCat=null;curSub=null;
  document.getElementById('modal-add').classList.add('show');
  document.getElementById('m-title').textContent=type==='income'?'记录收入':'记一笔';
  document.getElementById('inp-amt').value='';document.getElementById('inp-note').value='';
  const t=today();document.getElementById('inp-date').value=t;
  const [y,m,d]=t.split('-');
  document.getElementById('date-display-text').textContent=`${y}年${parseInt(m)}月${parseInt(d)}日`;
  document.getElementById('save-btn').textContent='保存';
  document.getElementById('del-btn').style.display='none';
  updateTypeBtns();renderCatGrid();document.getElementById('subcat-area').innerHTML='';
  setTimeout(()=>document.getElementById('inp-amt').focus(),350);
}

function deleteEditingRecord(){
  if(!editingId)return;
  showConfirm('确定删除此记录？',()=>{
    DB.records=DB.records.filter(x=>x.id!==editingId);
    editingId=null;saveDB();
    document.getElementById('modal-add').classList.remove('show');
    renderAll();
  });
}
window.deleteEditingRecord=deleteEditingRecord;

function closeModal(e,id){if(e.target===document.getElementById(id))document.getElementById(id).classList.remove('show')}
function setType(t){curType=t;curCat=null;curSub=null;updateTypeBtns();renderCatGrid();document.getElementById('subcat-area').innerHTML=''}
function updateTypeBtns(){const btns=document.querySelectorAll('#type-bar .tab-btn');btns[0].className='tab-btn'+(curType==='expense'?' active':'');btns[1].className='tab-btn'+(curType==='income'?' active':'')}
function renderCatGrid(){document.getElementById('cat-grid').innerHTML=getCats(curType).map(c=>`<button class="cat-sel${curCat===c.id?' sel':''}" onclick="selectCat('${c.id}')"><span class="ci">${c.icon}</span><span class="cl">${c.label}</span></button>`).join('')}
function selectCat(id){curCat=id;curSub=null;renderCatGrid();renderSubcats()}
function renderSubcats(){
  const area=document.getElementById('subcat-area');
  const cat=findCat(curType,curCat);
  if(cat?.subs?.length){
    let h='<div class="subcat-list">';
    cat.subs.forEach(s=>{h+=`<button class="subcat-chip${curSub===s.id?' sel':''}" onclick="selectSub('${s.id}')">${s.icon} ${s.label}</button>`});
    h+=`<button class="subcat-chip add-chip" onclick="openSubcatModal()">+ 自定义</button></div>`;
    area.innerHTML=h;
  }else{area.innerHTML='<div class="subcat-list"><button class="subcat-chip add-chip" onclick="openSubcatModal()">+ 添加子分类</button></div>'}
}
function selectSub(id){curSub=id;renderSubcats()}

let subcatIconVal='📌';
function openSubcatModal(){
  document.getElementById('modal-subcat').querySelector('h2').textContent='添加子分类';
  document.getElementById('modal-subcat').classList.add('show');
  document.getElementById('subcat-name').value='';
  subcatIconVal='📌';
  renderIconPicker('subcat-icon-grid',CAT_ICONS,subcatIconVal,v=>{subcatIconVal=v});
  setTimeout(()=>document.getElementById('subcat-name').focus(),350);
}
function saveSubcat(){
  const name=document.getElementById('subcat-name').value.trim();
  if(!name||!curCat)return;
  const cat=findCat(curType,curCat);if(!cat.subs)cat.subs=[];
  cat.subs.push({id:'c'+Date.now().toString(36),icon:subcatIconVal,label:name});saveDB();
  document.getElementById('modal-subcat').classList.remove('show');
  renderCatGrid();renderSubcats();
}

function saveRecord(){
  const amount=parseFloat(document.getElementById('inp-amt').value);
  if(!amount||!curCat)return;
  const date=document.getElementById('inp-date').value||today();
  if(editingId){
    const idx=DB.records.findIndex(x=>x.id===editingId);
    if(idx>=0){Object.assign(DB.records[idx],{type:curType,cat:curCat,sub:curSub,amount,note:document.getElementById('inp-note').value.trim(),date,ts:new Date(date).getTime()})}
    editingId=null;
  }else{
    DB.records.unshift({id:genId(),type:curType,cat:curCat,sub:curSub,amount,note:document.getElementById('inp-note').value.trim(),date,ts:new Date(date).getTime()});
  }
  DB.records.sort((a,b)=>b.ts-a.ts);saveDB();
  document.getElementById('modal-add').classList.remove('show');renderAll();
}

let rptMode='month',swipeIdx=1;

function setRptMode(mode){rptMode=mode;swipeIdx=1;document.querySelectorAll('#rpt-tabs .tab-btn').forEach((b,i)=>b.classList.toggle('active',i===(mode==='month'?0:1)));renderReport()}
function getPeriods(){
  const now=new Date(),y=now.getFullYear(),m=now.getMonth();
  if(rptMode==='month'){const lm=m===0?11:m-1,ly=m===0?y-1:y;return[{label:'上月',ym:`${ly}-${S(lm+1)}`,title:`${ly}年${lm+1}月`},{label:'本月',ym:`${y}-${S(m+1)}`,title:`${y}年${m+1}月`}]}
  return[{label:'上年',year:y-1,title:`${y-1}年`},{label:'本年',year:y,title:`${y}年`}];
}
function getPeriodRecs(p){return rptMode==='month'?DB.records.filter(r=>r.date.startsWith(p.ym)):DB.records.filter(r=>r.date.startsWith(String(p.year)))}

function renderReport(){
  const ps=getPeriods();if(swipeIdx>=ps.length)swipeIdx=ps.length-1;
  document.getElementById('swipe-dots').innerHTML=ps.map((_,i)=>`<div class="swipe-dot${i===swipeIdx?' active':''}"></div>`).join('');
  document.getElementById('swipe-lbl').textContent=ps[swipeIdx]?.label||'';
  document.getElementById('swipe-track').innerHTML=ps.map(p=>buildPanel(p)).join('');
  document.getElementById('swipe-track').style.transform=`translateX(-${swipeIdx*100}%)`;
}

function makePie(mainCats,total){
  if(total<=0)return'<svg class="pie-svg" viewBox="0 0 120 120"><circle cx="60" cy="60" r="50" fill="none" stroke="var(--bg-elevated)" stroke-width="16"/></svg>';
  const circ=2*Math.PI*50;let offset=0,arcs='';
  mainCats.forEach(([cid,val])=>{
    const pct=val/total;const dash=circ*pct;const col=catColor(cid);
    arcs+=`<circle cx="60" cy="60" r="50" fill="none" stroke="${col}" stroke-width="16" stroke-dasharray="${dash} ${circ-dash}" stroke-dashoffset="${-offset}" transform="rotate(-90 60 60)"/>`;
    offset+=dash;
  });
  return`<svg class="pie-svg" viewBox="0 0 120 120">${arcs}<circle cx="60" cy="60" r="42" fill="var(--bg-card)"/><text x="60" y="56" text-anchor="middle" fill="var(--text-s)" font-size="10">合计</text><text x="60" y="72" text-anchor="middle" fill="var(--text-p)" font-family="var(--mono)" font-size="14" font-weight="500">${total.toFixed(0)}</text></svg>`;
}

function makePieLegend(mainCats,total,type,pLabel){
  return mainCats.map(([cid,val])=>{
    const c=findCat(type,cid);const pct=total>0?((val/total)*100).toFixed(1):0;
    return`<div class="pie-legend-item" onclick="showCategoryRecords('${pLabel}','${type}','${cid}')"><div class="pie-legend-dot" style="background:${catColor(cid)}"></div><span style="font-size:13px">${c?.icon||'📌'}</span><span class="pie-legend-name">${c?.label||cid}</span><span class="pie-legend-val">${pct}%</span></div>`;
  }).join('');
}

function buildPanel(p){
  const recs=getPeriodRecs(p);
  const inc=recs.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0);
  const exp=recs.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0);
  const bal=inc-exp;

  let bars=[];
  if(rptMode==='year'){
    for(let mo=0;mo<12;mo++){
      const ym=`${p.year}-${S(mo+1)}`;const mr=recs.filter(r=>r.date.startsWith(ym));
      bars.push({label:`${mo+1}月`,exp:mr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0),inc:mr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0)});
    }
  }else{
    const[yy,mm]=p.ym.split('-').map(Number);const days=new Date(yy,mm,0).getDate();
    for(let d=1;d<=days;d+=3){const ds=`${p.ym}-${S(d)}`;const dr=recs.filter(r=>r.date===ds);bars.push({label:`${d}`,exp:dr.filter(r=>r.type==='expense').reduce((s,r)=>s+r.amount,0),inc:dr.filter(r=>r.type==='income').reduce((s,r)=>s+r.amount,0)})}
  }
  const maxBar=Math.max(...bars.flatMap(b=>[b.exp,b.inc]),1);
  let barsH=bars.map(b=>{
    const eh=Math.max(b.exp/maxBar*100,1),ih=Math.max(b.inc/maxBar*100,1);
    return`<div class="cb-wrap"><div class="cb ebar" style="height:${eh}%"></div><div class="cb ibar" style="height:${ih}%"></div><div class="cb-l">${b.label}</div></div>`;
  }).join('');

  const expMain={},incMain={};
  recs.filter(r=>r.type==='expense').forEach(r=>{expMain[r.cat]=(expMain[r.cat]||0)+r.amount});
  recs.filter(r=>r.type==='income').forEach(r=>{incMain[r.cat]=(incMain[r.cat]||0)+r.amount});
  const expSorted=Object.entries(expMain).sort((a,b)=>b[1]-a[1]);
  const incSorted=Object.entries(incMain).sort((a,b)=>b[1]-a[1]);

  let catH=expSorted.map(([cid,amount])=>{
    const pct=exp>0?((amount/exp)*100).toFixed(1):0;const c=findCat('expense',cid);
    return`<div class="cat-row" onclick="showCategoryRecords('${p.label}','expense','${cid}')"><div class="ce">${c?.icon||'📌'}</div><div class="cn">${c?.label||cid}</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${catColor(cid)}"></div></div><div class="cp">${pct}%</div><div class="cv" style="color:var(--expense)">${amount.toFixed(0)}</div></div>`;
  }).join('');

  const balTag=bal>=0?'<span class="tag tag-up">盈余</span>':'<span class="tag tag-down">超支</span>';

  return`<div class="swipe-panel">
    <div class="card">
      <div class="card-t">收支概况 · ${p.title}</div>
      <div class="ov-split">
        <div class="ov-s exp"><div class="os-lbl">支出</div><div class="os-val">¥${exp.toFixed(0)}</div></div>
        <div class="ov-s inc"><div class="os-lbl">收入</div><div class="os-val">¥${inc.toFixed(0)}</div></div>
      </div>
      <div class="sub" style="margin-top:10px">结余 ¥${bal.toFixed(0)} ${balTag}</div>
    </div>
    <div class="card">
      <div class="card-t">${rptMode==='year'?'月度':'日度'}趋势</div>
      <div class="chart-bars">${barsH}</div>
      <div class="legend"><div class="leg-i"><div class="leg-d" style="background:var(--expense)"></div>支出</div><div class="leg-i"><div class="leg-d" style="background:var(--income)"></div>收入</div></div>
    </div>
    <div class="card" id="pie-card-${p.label}">
      <div class="card-t">分类占比</div>
      <div class="pie-toggle">
        <button class="pie-tog-btn active" onclick="togglePie('${p.label}','expense',this)">支出</button>
        <button class="pie-tog-btn" onclick="togglePie('${p.label}','income',this)">收入</button>
      </div>
      <div id="pie-body-${p.label}">
        <div class="pie-wrap">${makePie(expSorted,exp)}<div class="pie-legend">${makePieLegend(expSorted,exp,'expense',p.label)}</div></div>
        ${catH}
      </div>
    </div>
    ${recs.length===0?'<div class="card"><div class="empty-text" style="text-align:center;color:var(--text-m);padding:16px">暂无数据</div></div>':''}
  </div>`;
}

function togglePie(label,type,btn){
  const card=document.getElementById('pie-card-'+label);
  card.querySelectorAll('.pie-tog-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const ps=getPeriods(),p=ps.find(x=>x.label===label);if(!p)return;
  const recs=getPeriodRecs(p);
  const total=recs.filter(r=>r.type===type).reduce((s,r)=>s+r.amount,0);
  const mainCats={};
  recs.filter(r=>r.type===type).forEach(r=>{mainCats[r.cat]=(mainCats[r.cat]||0)+r.amount});
  const sorted=Object.entries(mainCats).sort((a,b)=>b[1]-a[1]);

  let catH=sorted.map(([cid,amount])=>{
    const pct=total>0?((amount/total)*100).toFixed(1):0;const c=findCat(type,cid);
    return`<div class="cat-row" onclick="showCategoryRecords('${label}','${type}','${cid}')"><div class="ce">${c?.icon||'📌'}</div><div class="cn">${c?.label||cid}</div><div class="cat-bar-bg"><div class="cat-bar-fill" style="width:${pct}%;background:${catColor(cid)}"></div></div><div class="cp">${pct}%</div><div class="cv" style="color:${type==='expense'?'var(--expense)':'var(--income)'}">${amount.toFixed(0)}</div></div>`;
  }).join('');

  document.getElementById('pie-body-'+label).innerHTML=`<div class="pie-wrap">${makePie(sorted,total)}<div class="pie-legend">${makePieLegend(sorted,total,type,label)}</div></div>${catH}`;
}

// ═══════════════════════════════
//  SWIPE (report) - less sensitive
// ═══════════════════════════════
function initSwipe(){
  const wrap=document.getElementById('swipe-wrap'),track=document.getElementById('swipe-track');
  let sx=0,dx=0,sw=false;
  const THRESHOLD=0.35; // 35% instead of 20% - much less sensitive
  function onS(x){sx=x;sw=true;dx=0;track.style.transition='none'}
  function onM(x){if(!sw)return;dx=x-sx;track.style.transform=`translateX(${-swipeIdx*100+dx/wrap.clientWidth*100}%)`}
  function onE(){if(!sw)return;sw=false;track.style.transition='transform .35s cubic-bezier(.22,1,.36,1)';const n=getPeriods().length;if(dx<-wrap.clientWidth*THRESHOLD&&swipeIdx<n-1)swipeIdx++;else if(dx>wrap.clientWidth*THRESHOLD&&swipeIdx>0)swipeIdx--;dx=0;track.style.transform=`translateX(-${swipeIdx*100}%)`;const ps=getPeriods();document.getElementById('swipe-lbl').textContent=ps[swipeIdx]?.label||'';document.querySelectorAll('.swipe-dot').forEach((d,i)=>d.className='swipe-dot'+(i===swipeIdx?' active':''))}
  wrap.addEventListener('touchstart',e=>onS(e.touches[0].clientX),{passive:true});
  wrap.addEventListener('touchmove',e=>onM(e.touches[0].clientX),{passive:true});
  wrap.addEventListener('touchend',onE,{passive:true});
  wrap.addEventListener('mousedown',e=>onS(e.clientX));
  wrap.addEventListener('mousemove',e=>{if(sw)onM(e.clientX)});
  wrap.addEventListener('mouseup',onE);
}

let assetViewMonth=null; // null = overview mode, string = specific month view
let editingAssetIdx=-1;

function getAssetMonths(){
  // Only months that actually have asset data
  return [...new Set(DB.assets.map(a=>a.month))].sort().reverse();
}

function initAssetSwipe(){
  const el=document.getElementById('assets-content');
  if(!el)return;
  let sx=0,dx=0,sw=false;
  el.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sw=true;dx=0},{passive:true});
  el.addEventListener('touchmove',e=>{if(!sw)return;dx=e.touches[0].clientX-sx},{passive:true});
  el.addEventListener('touchend',()=>{if(!sw)return;sw=false;
    if(assetViewMonth&&dx<-60)assetNavNext();else if(assetViewMonth&&dx>60)assetNavPrev();
    dx=0},{passive:true});
}

function assetNavPrev(){
  const months=getAssetMonths();
  let idx=months.indexOf(assetViewMonth);
  if(idx<months.length-1){assetViewMonth=months[idx+1];renderAssets()}
}
function assetNavNext(){
  const months=getAssetMonths();
  let idx=months.indexOf(assetViewMonth);
  if(idx>0){assetViewMonth=months[idx-1];renderAssets()}
}

// ═══════════════════════════════
//  ASSETS
// ═══════════════════════════════
function renderAssets(){
  const months=getAssetMonths();

  // Overview mode: show all month entries
  if(!assetViewMonth){
    document.getElementById('asset-title').textContent='资产';
    document.getElementById('asset-month-label').textContent=`共${months.length}个月`;

    let html='';
    if(months.length===0){
      html=`<div class="empty" style="padding-top:80px"><div class="empty-icon">💰</div><div class="empty-text">还没有资产记录</div></div>`;
    }else{
      // Show each month as a card
      months.forEach(m=>{
        const asset=DB.assets.find(a=>a.month===m);
        const total=asset?.accounts.reduce((s,a)=>s+a.amount,0)||0;
        const [y,mm]=m.split('-');
        html+=`<div class="card" style="cursor:pointer" onclick="assetViewMonth='${m}';renderAssets()">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div>
              <div style="font-size:16px;font-weight:600">${y}年${parseInt(mm)}月</div>
              <div style="font-size:12px;color:var(--text-m);margin-top:2px">${asset?.accounts.length||0}个账户</div>
            </div>
            <div style="font-family:var(--mono);font-size:20px;font-weight:500;color:var(--accent)">¥${total.toFixed(2)}</div>
          </div>
        </div>`;
      });
    }
    html+=`<div style="padding:16px 0"><button class="add-asset" onclick="openAddMonthModal()">+ 添加月份资产</button></div>`;

    // Chart
    html+=`<div class="card"><div class="card-t">资产走势</div><div id="asset-chart"></div></div>`;

    document.getElementById('assets-content').innerHTML=html;
    renderAssetChart(months);
    return;
  }

  // Month detail mode
  const curAsset=DB.assets.find(a=>a.month===assetViewMonth);
  const total=curAsset?.accounts.reduce((s,a)=>s+a.amount,0)||0;

  const [ay,am]=assetViewMonth.split('-').map(Number);
  const pm=am===1?`${ay-1}-12`:`${ay}-${S(am-1)}`;
  const prevAsset=DB.assets.find(a=>a.month===pm);
  const prevTotal=prevAsset?.accounts.reduce((s,a)=>s+a.amount,0)||0;
  const diff=total-prevTotal;
  const trendStr=prevTotal>0?(diff>=0?`<span style="color:var(--income)">↑ +${diff.toFixed(0)}</span>`:`<span style="color:var(--expense)">↓ ${diff.toFixed(0)}</span>`):'';

  document.getElementById('asset-title').textContent=`${am}月资产`;
  document.getElementById('asset-month-label').textContent=`${ay}年${am}月 · 滑动切换`;

  let html=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
    <button class="qbtn" style="flex:0;padding:10px 14px" onclick="assetViewMonth=null;renderAssets()">← 返回</button>
    <div style="flex:1"></div>
  </div>`;

  html+=`<div class="asset-total"><div class="at-label">${ay}年${am}月总资产</div><div class="at-val">¥${total.toFixed(2)}</div><div class="asset-trend">${trendStr}</div></div>`;

  if(curAsset?.accounts?.length){
    curAsset.accounts.forEach((a,i)=>{
      html+=`<div class="asset-item" onclick="editAsset(${i})"><span class="ai-icon" onclick="event.stopPropagation();changeAssetIcon(${i})">${a.icon||P_ICONS[a.platform]||'💰'}</span><span class="ai-name">${a.name}</span><span class="ai-val">¥${a.amount.toFixed(2)}</span></div>`;
    });
  }
  html+=`<div style="padding:0 0 16px"><button class="add-asset" onclick="openAssetModal()">+ 添加账户</button></div>`;

  document.getElementById('assets-content').innerHTML=html;
  initAssetSwipe();
}

function renderAssetChart(months){
  const container=document.getElementById('asset-chart');if(!container)return;
  const mths=months.slice(0,12).reverse();
  let bars=[];
  mths.forEach(m=>{
    const a=DB.assets.find(x=>x.month===m);
    const val=a?.accounts.reduce((s,x)=>s+x.amount,0)||0;
    bars.push({label:m.slice(5)+'月',val,month:m});
  });
  if(bars.length===0){container.innerHTML='<div class="empty-text" style="text-align:center;color:var(--text-m);padding:16px">暂无数据</div>';return}
  const mx=Math.max(...bars.map(v=>v.val),1);
  let html='<div class="chart-bars" style="height:140px">';
  bars.forEach((b,i)=>{
    const h=Math.max(b.val/mx*100,2);
    let pctStr='',pctColor='var(--text-m)';
    if(i>0&&bars[i-1].val>0){
      const pctChange=((b.val-bars[i-1].val)/bars[i-1].val*100);
      pctStr=(pctChange>=0?'+':'')+pctChange.toFixed(1)+'%';
      pctColor=pctChange>=0?'var(--income)':'var(--expense)';
    }
    const isActive=b.month===assetViewMonth;
    html+=`<div class="cb-wrap at-bar-wrap" style="cursor:pointer" onclick="assetViewMonth='${b.month}';renderAssets()">${pctStr?`<div class="at-pct" style="color:${pctColor}">${pctStr}</div>`:''}<div class="cb" style="height:${h}%;background:var(--accent);opacity:${isActive?1:.5}"></div><div class="cb-l" style="${isActive?'color:var(--accent);font-weight:600':''}">${b.label}</div></div>`;
  });
  html+='</div>';
  container.innerHTML=html;
}

function saveAsset(){
  const platform=document.getElementById('asset-platform').value;
  const name=document.getElementById('asset-custom-name').value.trim()||(P_NAMES[platform]||platform);
  const amount=parseFloat(document.getElementById('asset-amount').value);
  if(isNaN(amount)||!assetViewMonth)return;
  const month=assetViewMonth;
  let asset=DB.assets.find(a=>a.month===month);
  if(!asset){asset={id:genId(),month,accounts:[]};DB.assets.push(asset)}
  if(editingAssetIdx>=0&&asset.accounts[editingAssetIdx]){
    Object.assign(asset.accounts[editingAssetIdx],{platform,name,icon:assetIconVal,amount});
  }else{
    asset.accounts.push({platform,name,icon:assetIconVal,amount});
  }
  editingAssetIdx=-1;saveDB();
  document.getElementById('modal-asset').classList.remove('show');renderAssets();
}

}

let iconPickerState={};

function renderIconPicker(containerId,icons,selected,cb){
  iconPickerState[containerId]={icons,selected,cb};
  const el=document.getElementById(containerId);
  el.innerHTML=icons.map(ic=>`<button class="icon-opt${ic===selected?' sel':''}" data-icon="${ic.replace(/"/g,'&quot;')}">${ic}</button>`).join('');
  // Use event delegation — no innerHTML rewrite on click
  if(!el._delegated){
    el._delegated=true;
    el.addEventListener('click',function(e){
      const btn=e.target.closest('.icon-opt');
      if(!btn)return;
      const ic=btn.dataset.icon;
      const st=iconPickerState[this.id];
      if(!st)return;
      st.selected=ic;
      this.querySelectorAll('.icon-opt').forEach(b=>b.classList.toggle('sel',b.dataset.icon===ic));
      if(st.cb)st.cb(ic);
    });
  }
}

      <div class="cm-icon">${s.icon}</div>
      <div class="cm-name">${s.label}</div>
      <button class="ai-del" onclick="event.stopPropagation();deleteSubcat('${type}','${cid}',${i})">×</button>
    </div>`;
  });
  html+=`<div style="padding:12px 0"><button class="add-asset" onclick="addSubcatToDetail()">+ 添加子分类</button></div>`;
  html+=`</div>`;
  document.getElementById('catdetail-content').innerHTML=html;
}

function changeCatIcon(type,cid){
  const c=findCat(type,cid);if(!c)return;
  iconModalCtx={type,cid};
  document.getElementById('icon-name-input').value=c.label;
  document.getElementById('icon-name-field').style.display='';
  renderIconPicker('cat-icon-grid',CAT_ICONS,c.icon,v=>{});
  document.getElementById('modal-cat-icon').querySelector('h2').textContent='编辑分类';
  document.getElementById('modal-cat-icon').classList.add('show');
}

function changeSubIcon(type,cid,idx){
  const c=findCat(type,cid);if(!c||!c.subs[idx])return;
  iconModalCtx={type,cid,idx};
  document.getElementById('icon-name-input').value=c.subs[idx].label;
  document.getElementById('icon-name-field').style.display='';
  renderIconPicker('cat-icon-grid',CAT_ICONS,c.subs[idx].icon,v=>{});
  document.getElementById('modal-cat-icon').querySelector('h2').textContent='编辑子分类';
  document.getElementById('modal-cat-icon').classList.add('show');
}

function deleteSubcat(type,cid,idx){
  const c=findCat(type,cid);if(!c||!c.subs[idx])return;
  showConfirm('删除子分类"'+c.subs[idx].label+'"？',()=>{c.subs.splice(idx,1);saveDB();renderCatDetail(type,cid)});
}

function deleteCat(type,cid){
  const c=findCat(type,cid);if(!c)return;
  const subCount=c.subs?.length||0;
  const used=DB.records.some(r=>r.type===type&&r.cat===cid);
  let msg='确定删除分类"'+c.label+'"？';
  if(subCount>0)msg='分类"'+c.label+'"下还有 '+subCount+' 个子分类，删除后子分类也会一并清除。确定删除？';
  if(used)msg+='\n（已有记账记录使用此分类，记录不会删除但会显示为"未知"）';
  showConfirm(msg,()=>{
    const cats=DB.categories[type];
    const idx=cats.findIndex(x=>x.id===cid);
    if(idx>=0){cats.splice(idx,1);saveDB();renderCatMgmt();showSubpage('sp-catmgmt')}
  });
}
window.deleteSubcat=deleteSubcat;
window.deleteCat=deleteCat;

let detailSubcatIcon='📌';
function addSubcatToDetail(){
  document.getElementById('modal-subcat').querySelector('h2').textContent='添加子分类';
  document.getElementById('modal-subcat').classList.add('show');
  document.getElementById('subcat-name').value='';
  detailSubcatIcon='📌';
  renderIconPicker('subcat-icon-grid',CAT_ICONS,detailSubcatIcon,v=>{detailSubcatIcon=v});
  // Override save to add to detail category
  window._detailSubcatSave=true;
  setTimeout(()=>document.getElementById('subcat-name').focus(),350);
}

let newCatIcon='📌';
function addNewCategory(){
  document.getElementById('modal-subcat').querySelector('h2').textContent='添加分类';
  document.getElementById('modal-subcat').classList.add('show');
  document.getElementById('subcat-name').value='';
  newCatIcon='📌';
  renderIconPicker('subcat-icon-grid',CAT_ICONS,newCatIcon,v=>{newCatIcon=v});
  window._newCatSave=true;
  setTimeout(()=>document.getElementById('subcat-name').focus(),350);
}

// Override saveSubcat for detail page and new category
const _origSaveSubcat=saveSubcat;
function saveSubcat(){
  if(window._newCatSave){
    const name=document.getElementById('subcat-name').value.trim();
    if(!name)return;
    DB.categories[catMgmtType].push({id:'cat'+Date.now().toString(36),icon:newCatIcon,label:name,subs:[]});
    saveDB();window._newCatSave=false;
    document.getElementById('modal-subcat').classList.remove('show');
    renderCatMgmt();
    return;
  }
  if(window._detailSubcatSave){
    const name=document.getElementById('subcat-name').value.trim();
    if(!name||!detailCatId)return;
    const c=findCat(detailType,detailCatId);if(!c)return;
    if(!c.subs)c.subs=[];
    c.subs.push({id:'c'+Date.now().toString(36),icon:detailSubcatIcon,label:name});
    saveDB();window._detailSubcatSave=false;
    document.getElementById('modal-subcat').classList.remove('show');
    renderCatDetail(detailType,detailCatId);
    return;
  }
  _origSaveSubcat();
}

// Data subpage - CSV only
// ═══════════════════════════════
//  DATA PAGE — 导入导出
// ═══════════════════════════════
function renderDataPage(){
  const el=document.getElementById('data-content');
  el.innerHTML=`
    <div class="card">
      <div class="card-t">导出</div>
      <button class="qbtn" style="width:100%;margin-bottom:10px" id="exp-csv">📊 导出 CSV（Excel 可打开）</button>
      <button class="qbtn" style="width:100%" id="exp-json">🗂️ 导出 JSON（完整备份）</button>
    </div>
    <div class="card">
      <div class="card-t">导入</div>
      <input type="file" id="imp-file" accept=".csv,.json" style="display:none">
      <button class="qbtn" style="width:100%" id="imp-btn">📂 导入数据</button>
      <div style="font-size:11px;color:var(--text-m);margin-top:10px">支持 CSV 和 JSON 格式</div>
    </div>`;
  document.getElementById('exp-csv').onclick=doExportCSV;
  document.getElementById('exp-json').onclick=doExportJSON;
  document.getElementById('imp-btn').onclick=function(){document.getElementById('imp-file').click()};
  document.getElementById('imp-file').onchange=doImport;
}

function doExportCSV(){
  if(!DB.records.length){alert('暂无记录可导出');return}
  let t='\uFEFF日期,类型,大类,子类,金额,备注\n';
  DB.records.forEach(r=>{
    const c=findCat(r.type,r.cat),s=r.sub?findSub(r.type,r.cat,r.sub):null;
    t+=r.date+','+(r.type==='income'?'收入':'支出')+','+(c?.label||r.cat)+','+(s?.label||'')+','+r.amount+','+(r.note||'')+'\n';
  });
  saveFile(t,'记账_'+today()+'.csv','text/csv;charset=utf-8');
}

function doExportJSON(){
  saveFile(JSON.stringify(DB,null,2),'记账备份_'+today()+'.json','application/json');
}

function doImport(evt){
  const file=evt.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const txt=e.target.result;
    const name=file.name.toLowerCase();
    if(name.endsWith('.json')){importJSON(txt)}
    else{importCSV(txt)}
  };
  reader.readAsText(file);
  evt.target.value='';
}

function importCSV(txt){
  try{
    const lines=txt.split('\n').filter(l=>l.trim());
    if(lines.length<2){alert('文件为空');return}
    let n=0;
    for(let i=1;i<lines.length;i++){
      const p=lines[i].split(',');
      if(p.length<5)continue;
      const date=p[0].trim(),typeStr=p[1].trim(),catLabel=p[2].trim(),subLabel=p[3].trim(),amount=p[4].trim(),note=(p[5]||'').trim();
      const type=typeStr==='收入'?'income':'expense';
      const cats=getCats(type);
      let cat=null,sub=null;
      for(const c of cats){
        if(c.label===catLabel){
          cat=c.id;
          if(subLabel&&c.subs){for(const s of c.subs){if(s.label===subLabel){sub=s.id;break}}}
          break;
        }
      }
      if(!cat)continue;
      DB.records.push({id:genId(),type,cat,sub,amount:parseFloat(amount)||0,note:note,date:date,ts:new Date(date).getTime()});
      n++;
    }
    DB.records.sort(function(a,b){return b.ts-a.ts});
    saveDB();renderAll();
    alert('成功导入 '+n+' 条记录');
  }catch(e){alert('导入失败: '+e.message)}
}

function importJSON(txt){
  try{
    const data=JSON.parse(txt);
    if(!data.records||!Array.isArray(data.records)){alert('JSON 格式不正确');return}
    const n=data.records.length;
    if(!confirm('将导入 '+n+' 条记录，当前 '+DB.records.length+' 条记录会保留（追加）。继续？'))return;
    data.records.forEach(function(r){DB.records.push(r)});
    DB.records.sort(function(a,b){return b.ts-a.ts});
    if(data.assets)DB.assets=data.assets;
    saveDB();renderAll();
    alert('成功导入 '+n+' 条记录');
  }catch(e){alert('导入失败: '+e.message)}
}

function saveFile(content,filename,mime){
  // Capacitor Android
  if(window.Capacitor&&typeof Capacitor.isNativePlatform==='function'&&Capacitor.isNativePlatform()){
    var Fs=Capacitor.Plugins&&Capacitor.Plugins.Filesystem;
    var Sh=Capacitor.Plugins&&Capacitor.Plugins.Share;
    if(Fs&&Sh){
      Fs.writeFile({path:filename,data:content,directory:'Documents',encoding:'utf8'})
        .then(function(r){return Sh.share({title:filename,text:'导出文件',url:r.uri})})
        .catch(function(e){alert('导出失败: '+e.message)});
      return;
    }
  }
  // Browser
  var blob=new Blob([content],{type:mime});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download=filename;a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url)},200);
}
let clearTimer=null;
function clearAllData(){
  const btn=document.getElementById('clear-confirm-btn');
  const cd=document.getElementById('clear-countdown');
  btn.disabled=true;btn.style.opacity='.4';
  cd.textContent='5';
  document.getElementById('modal-clear').classList.add('show');
  let sec=5;
  clearInterval(clearTimer);
  clearTimer=setInterval(()=>{
    sec--;
    cd.textContent=sec;
    if(sec<=0){
      clearInterval(clearTimer);
      btn.disabled=false;btn.style.opacity='1';
      btn.textContent='确认清除';
    }
  },1000);
}
function doClearData(){
  clearInterval(clearTimer);
  document.getElementById('modal-clear').classList.remove('show');
  DB.records=[];
  DB.assets=[];
  saveDB();
  assetViewMonth=null;
  renderAll();
}

// ═══════════════════════════════
//  EXPORT/IMPORT (CSV only)
// ═══════════════════════════════
function exportCSV(){
  try{
    if(!DB||!DB.records||!DB.records.length){alert('暂无记录可导出');return}
    let csv='\uFEFF日期,类型,大类,子类,金额,备注\n';
    DB.records.sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
      const c=findCat(r.type,r.cat),s=r.sub?findSub(r.type,r.cat,r.sub):null;
      csv+=`${r.date},${r.type==='income'?'收入':'支出'},${c?.label||r.cat},${s?.label||''},${r.amount},${r.note||''}\n`;
    });
    dl(csv,'记账数据_'+today()+'.csv','text/csv;charset=utf-8');
  }catch(e){alert('导出失败: '+e.message)}
}

function importCSV(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('文件为空');return}
      let imported=0;
      for(let i=1;i<lines.length;i++){
        const parts=lines[i].split(',');
        if(parts.length<5)continue;
        const [date,typeStr,catLabel,subLabel,amount,note]=parts.map(s=>s.trim());
        const type=typeStr==='收入'?'income':'expense';
        // Find category by label
        const cats=getCats(type);
        let cat=null,sub=null;
        for(const c of cats){if(c.label===catLabel){cat=c.id;if(subLabel){for(const s of(c.subs||[])){if(s.label===subLabel){sub=s.id;break}}}break}}
        if(!cat)continue;
        DB.records.push({id:genId(),type,cat,sub,amount:parseFloat(amount)||0,note:note||'',date,ts:new Date(date).getTime()});
        imported++;
      }
      DB.records.sort((a,b)=>b.ts-a.ts);saveDB();
      alert(`成功导入 ${imported} 条记录`);renderAll();
    }catch(err){alert('解析失败: '+err.message)}
  };
  r.readAsText(f);e.target.value='';
}

function dl(c,n,t){
  try{
    // Capacitor Android
    if(window.Capacitor&&typeof Capacitor.isNativePlatform==='function'&&Capacitor.isNativePlatform()){
      const Fs=Capacitor.Plugins&&Capacitor.Plugins.Filesystem;
      const Sh=Capacitor.Plugins&&Capacitor.Plugins.Share;
      if(Fs&&Sh){
        Fs.writeFile({path:n, data:c, directory:'Documents', encoding:'utf8'})
          .then(r=>Sh.share({title:n,text:'CSV 数据文件',url:r.uri||undefined}))
          .catch(e=>alert('导出失败: '+e.message));
        return;
      }
    }
    // Browser — same as original JSON export
    const b=new Blob([c],{type:t});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download=n;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }catch(e){alert('导出失败: '+e.message);console.error('dl error:',e)}
}

function nav(tab){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('p-'+tab).classList.add('active');
  document.querySelector(`.nav-item[data-tab="${tab}"]`)?.classList.add('active');
  // Reset subpages when switching tabs
  if(tab==='profile'){showSubpage(null);renderProfile()}
  if(tab==='report')renderReport();
  if(tab==='assets'){assetViewMonth=null;renderAssets()}
  if(tab==='home')renderHome();
}
function renderAll(){renderHome();renderAssets();renderProfile()}

seed();applyTheme(DB.theme);renderAll();initSwipe();
